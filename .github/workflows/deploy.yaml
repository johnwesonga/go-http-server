name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: johnwesonga/go-http-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Go (optional, for tests)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      # Run tests (optional but recommended)
      - name: Run tests
        run: go test ./...

      # Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & push image
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      # Configure kubeconfig
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # Update deployment image
      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl set image deployment/go-http-server \
            go-http-server=$IMAGE_NAME:$IMAGE_TAG

      # Verify rollout
      - name: Verify deployment
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl rollout status deployment/go-http-server